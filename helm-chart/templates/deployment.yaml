apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognitest-engine
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: cognitest-engine
  template:
    metadata:
      labels:
        app: cognitest-engine
    spec:
      containers:
        - name: cognitest-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
