trigger:
  - main

pool:
  vmImage: ubuntu-latest

stages:
  - stage: validate
    jobs:
      - job: validate_engine
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
          - script: npm ci
            displayName: Install dependencies
          - script: npm run lint
            displayName: Run lint
          - script: npm run typecheck
            displayName: Run typecheck
          - script: npm run build
            displayName: Build service
          - script: npm run test
            displayName: Run sample execution

  - stage: package
    dependsOn: validate
    jobs:
      - job: docker_build
        steps:
          - script: docker build -t cognitest-engine:$(Build.BuildId) .
            displayName: Build Docker image
